<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — PricePulse</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #f8fafc; /* Slate 50 */
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;
            --color-text: #0f172a;
            --color-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.12);
            --accent-blue: #3b82f6;
            --accent-red: #f43f5e;
            --accent-red-glow: rgba(244, 63, 94, 0.08);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .header-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 2.2rem;
            color: var(--primary);
            filter: drop-shadow(0 0 6px var(--primary-glow));
            margin-bottom: 0.25rem;
        }

        .header-section h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--color-text), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: var(--color-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--color-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--color-muted);
            font-size: 0.95rem;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--color-text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background-color: #ffffff;
        }

        .error-banner {
            background-color: var(--accent-red-glow);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--accent-red);
            padding: 0.65rem 0.85rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 14px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--color-muted);
            font-weight: 500;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }

        .footer-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header-section">
            <div class="logo-icon"><i class="fa-solid fa-chart-line"></i></div>
            <h1>Create Account</h1>
            <p>Sign up to start tracking prices</p>
        </div>

        <form action="/register" method="POST" autocomplete="off">
            {% if error %}
            <div class="error-banner">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            <div style="height: 0.75rem;"></div>
            {% endif %}

            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Create a password (min 6 chars)" minlength="6" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm your password" minlength="6" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" style="margin-top: 0.5rem;">
                <span>Sign Up</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</body>
</html>
